name: Continuous Integration

# A push to a branch with an open PR triggers both `push` and `pull_request`
# runs for the same commit. Group them so only the latest commit's run survives;
# superseded runs are cancelled instead of piling up in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    paths-ignore:
      - 'doc/**'
      - 'contrib/**'
      - '**/*.md'
  workflow_dispatch:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'contrib/**'
      - '**/*.md'

jobs:
  build:
    name: ${{ matrix.name }}

    env:
      MAKEJOBS: "-j3"
      CHECK_DOC: "0"
      CCACHE_SIZE: "100M"
      CCACHE_TEMPDIR: /tmp/.ccache-temp
      CCACHE_COMPRESS: "1"
      PYTHON_DEBUG: "1"
      WINEDEBUG: fixme-all
      SDK_URL: https://bitcoincore.org/depends-sources/sdks

    strategy:
      fail-fast: false
      matrix:
        name:
          - x86_64-linux-dbg
        include:
          - name: x86_64-linux-dbg
            host: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            packages: bc python3-zmq
            run-tests: true
            dep-opts: "DEBUG=1"
            config-opts: "--enable-glibc-back-compat --enable-reduce-exports CPPFLAGS=-DDEBUG_LOCKORDER"
            goal: install

    runs-on: ${{ matrix.os }}

    steps:
      - name: Add architecture
        if: ${{ matrix.arch }}
        run: |
          sudo dpkg --add-architecture "${{ matrix.arch }}"
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install build-essential libtool autotools-dev automake pkg-config bsdmainutils curl ca-certificates ccache python3 rsync git procps bison
          sudo apt-get install ${{ matrix.packages }}
      - name: Post install
        if: ${{ matrix.postinstall }}
        run: ${{ matrix.postinstall }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency cache
        uses: actions/cache@v4
        env:
          cache-name: depends
        with:
          path: ./depends/built
          key: ${{ matrix.name }}-${{ env.cache-name }}-${{ hashFiles('depends/packages/*') }}

      - name: Build depends
        run: |
          # NO_PROTON=1 skips building Apache Qpid Proton, matching zcutil/build.sh.
          # Proton (AMQP) is disabled in the zcash build, and proton 0.26.0 fails
          # to compile under modern gcc (-Werror on generated protocol.h), so
          # building it here is both pointless and a hard CI failure.
          make $MAKEJOBS -C depends HOST=${{ matrix.host }} NO_PROTON=1 ${{ matrix.dep-opts }}
      - name: CCache
        uses: actions/cache@v4
        env:
          cache-name: ccache
        with:
          path: ~/.ccache
          key: ${{ matrix.name }}-${{ env.cache-name }}-${{ hashFiles('**/configure.ac') }}

      - name: Build Zclassic
        run: |
           bash zcutil/build-linux-ci.sh ${{ matrix.goal }} || ( echo "Build failure. Verbose build follows." && make ${{ matrix.goal }} V=1 ; false )
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Zclassic-Wallet-${{ github.sha }}-${{ matrix.name }}
          path: |
            depends/bin/*
